name: RSS Digest
on:
  schedule:
    - cron: '0 0,12 * * *'   # 08:00 & 20:00 北京时间 (00:00/12:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install feedparser httpx --quiet
      - run: python rss_digest.py
        env:
          RSS_API_KEY: ${{ secrets.RSS_API_KEY }}
      - run: |
          git config user.name "rss-bot"
          git config user.email "bot@localhost"
          git add docs/index.md
          git diff --cached --quiet || git commit -m "digest $(date +%Y-%m-%d)"
          git push
